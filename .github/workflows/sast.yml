name: Perform Static Application Security Testing
description: A reusable workflow to perform SaST on a given repo. See docs/README-sast.md for more info.

on:
  workflow_call:
    inputs:
      image_uri:
        description: "URI of image to scan. The workflow intentionally doesn't perform any image building."
        required: false
        type: string
      dockerfile_path:
        description: "Path to Dockerfile that will be used by Snyk to scan"
        required: false
        default: "Dockerfile"
        type: string
      iac_path:
        description: "Path to repo's helm deployment files. Leave unset to not run the checks"
        required: false
        default: ""
        type: string
      minimum_threshold:
        description: "The minimum threshold to report vulnerabilities. Must be one of low|medium|high|critical"
        required: false
        default: "high"
        type: string
      exclude_base_image_vulns:
        description: "Set true to pass --exclude-base-image-vulns to Snyk container scans"
        required: false
        default: false
        type: boolean
      ecr_session_name:
        description: "The name of the session to use in ECR. Used for auditing purposes, set to what makes sense."
        required: false
        default: "laa-reusable-snyk"
        type: string
    # These secrets MUST be set to authenticate
    # You can alternatively also pass a static token in to authenticate
    secrets:
      SNYK_TOKEN:
        required: false
      SNYK_CLIENT_ID:
        required: false
      SNYK_CLIENT_SECRET:
        required: false
      ECR_ROLE_TO_ASSUME:
        required: false

jobs:
  sast:
    name: Scan IaC & Container with Snyk
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Secrets can't be used in if-checks so we have to define a global flag to verify
      - name: Check if we have tokens defined
        env:
          INPUTS_IMAGE_URI: ${{ inputs.image_uri }}
        run: |
          echo "has_token=${{ secrets.SNYK_TOKEN != '' }}" >> $GITHUB_ENV
          echo "has_oauth=${{ secrets.SNYK_CLIENT_ID != '' && secrets.SNYK_CLIENT_SECRET != ''}}" >> $GITHUB_ENV
          echo "has_ecr_role=${{ secrets.ECR_ROLE_TO_ASSUME != '' }}" >> $GITHUB_ENV

          has_token="${{ secrets.SNYK_TOKEN != '' }}"
          has_oauth="${{ secrets.SNYK_CLIENT_ID != '' && secrets.SNYK_CLIENT_SECRET != ''}}"
          has_ecr_role="${{ secrets.ECR_ROLE_TO_ASSUME != '' }}"

          if [[ "$has_token" == 'false' && "$has_oauth" == 'false' ]]; then
            echo "::error::Either SNYK_TOKEN or both SNYK_CLIENT_ID and SNYK_CLIENT_SECRET must be set"
            exit 1
          fi

          if [[ "${INPUTS_IMAGE_URI}" != '' && "$has_ecr_role" == 'false' ]]; then
            echo "::error::image_uri was provided but no ECR role is configured. Set the ECR_ROLE_TO_ASSUME secret or pass the ecr_role input."
            exit 1
          fi

      # Early exit if there's no container setup to scan
      - name: Check Dockerfile exists
        env:
          INPUTS_DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
        run: |
          if [ ! -f "${INPUTS_DOCKERFILE_PATH}" ]; then
            echo "::error::Dockerfile not found at ${INPUTS_DOCKERFILE_PATH}, seems there isn't a container to scan"
            exit 1
          fi

      - name: Configure AWS credentials for ECR access
        if: ${{ env.has_ecr_role == 'true' }}
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/ecr-auth@583a60502327d7b9b7701fdb11be9f7d096cf9f5 # SHA for main as of 12/06/2026
        with:
          ecr_role: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          ecr_region: "eu-west-2"
          role-session-name: ${{ inputs.ecr_session_name }}

      - name: Obtain Short-lived token
        id: auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/snyk-auth@6db001458db30ae747d9eb8eb25707ce52b359bc
        if: ${{ env.has_token == 'false' }}
        with:
          client_id: ${{ secrets.SNYK_CLIENT_ID }}
          client_secret: ${{ secrets.SNYK_CLIENT_SECRET }}

      - name: Install Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04

      - name: Scan dependencies using container runtime
        if: ${{ inputs.image_uri != '' }}
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          MINIMUM_THRESHOLD: ${{ inputs.minimum_threshold }}
          INPUTS_IMAGE_URI: ${{ inputs.image_uri }}
          INPUTS_DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
          INPUTS_EXCLUDE_BASE_IMAGE_VULNS: ${{ inputs.exclude_base_image_vulns }}
        run: |
          case "${INPUTS_EXCLUDE_BASE_IMAGE_VULNS}" in
            true|false) ;;
            *)
              echo "::error::exclude_base_image_vulns must be true or false"
              exit 1
              ;;
          esac

          mkdir -p sarif
          if [ "${INPUTS_EXCLUDE_BASE_IMAGE_VULNS}" = "true" ]; then
            snyk container test "${INPUTS_IMAGE_URI}" \
              --severity-threshold="${MINIMUM_THRESHOLD}" \
              --sarif-file-output="sarif/snyk.sarif" \
              --file="${INPUTS_DOCKERFILE_PATH}" \
              --exclude-base-image-vulns
          else
            snyk container test "${INPUTS_IMAGE_URI}" \
              --severity-threshold="${MINIMUM_THRESHOLD}" \
              --sarif-file-output="sarif/snyk.sarif" \
              --file="${INPUTS_DOCKERFILE_PATH}"
          fi

      - name: Monitor current dependencies
        if: ${{ inputs.image_uri != '' }}
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          INPUTS_IMAGE_URI: ${{ inputs.image_uri }}
          INPUTS_DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
        run: |
          snyk container monitor ${INPUTS_IMAGE_URI} \
            --file=${INPUTS_DOCKERFILE_PATH}

      - name: Scan Infrastructure as Code files
        if: hashFiles(inputs.iac_path)
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          MINIMUM_THRESHOLD: ${{ inputs.minimum_threshold }}
          INPUTS_IAC_PATH: ${{ inputs.iac_path }}
        run: |
          snyk iac test ${INPUTS_IAC_PATH} \
            --severity-threshold=${MINIMUM_THRESHOLD} \
            --sarif-file-output=sarif/snyk-iac.sarif

      - name: Scan codebase
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          MINIMUM_THRESHOLD: ${{ inputs.minimum_threshold }}
        run: |
          snyk code test \
            --severity-threshold=${MINIMUM_THRESHOLD} \
            --sarif-file-output=sarif/snyk-code.sarif

      - name: Sanitise SARIF files
        if: always()
        run: |
          for sarif in sarif/*.sarif; do
            if [ -f "$sarif" ]; then
              sed -i 's/"security-severity": "null"/"security-severity": "0"/g' "$sarif"
              sed -i 's/"security-severity": "undefined"/"security-severity": "0"/g' "$sarif"
            fi
          done

      - name: Upload SARIF files
        if: always() && hashFiles('sarif/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: "sarif"
