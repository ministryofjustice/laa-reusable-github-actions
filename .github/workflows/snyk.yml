name: Reusable Snyk Docker Image Scan

on:
  workflow_call:
    inputs:
      tag:
        description: "Label to tag the docker image with"
        required: true
        type: string
      dockerfile_path:
        description: Path to dockerfile
        required: false
        type: string
        default: Dockerfile #--Dockerfile in current working directory
    secrets:
      snyk_token:
        description: "Snyk service account API token"
        required: true

jobs:
  snyk:
    name: Scan docker image
    runs-on: ubuntu-latest
    steps:
    - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 #v1 Beta 9

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #--v6.0.2

    - name: Build docker image
      run: |
        docker build \
          --tag ${{ inputs.tag }}:scan \
          --file ${{ inputs.dockerfile_path }} .

    - name: Scan docker image using Snyk
      continue-on-error: true
      uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
      env:
        SNYK_TOKEN: ${{ secrets.snyk_token }}
      with:
        image: ${{ inputs.tag }}:scan
        args: --file=${{ inputs.dockerfile_path }}

    - name: Monitor docker image using Snyk
      uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04
      env:
        SNYK_TOKEN: ${{ secrets.snyk_token }}
      with:
        command: monitor
        image: ${{ inputs.tag }}:scan
        args: --file=Dockerfile

    - name: Replace security-severity "null" for license-related findings
      run: |
        sed -i 's/"security-severity": "null"/"security-severity": "0"/g' snyk.sarif

    - name: Replace security-severity "undefined" for license-related findings
      run: |
        sed -i 's/"security-severity": "undefined"/"security-severity": "0"/g' snyk.sarif

    - name: Upload result to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e #--v4.35.4
      with:
        sarif_file: snyk.sarif
